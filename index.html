      [186, 8], [342, 9], [275, 6], [168, 7], [189, 4]
    ],
    randomGen: () => {
      // 3桁÷1桁、百の位に商が立たない(=被除数の百の位 < divisor)、商は2桁
      while (true) {
        const div = rand(3, 9);
        const dividend = rand(100, 999);
        const firstDigit = Math.floor(dividend / 100);
        if (firstDigit < div) return [dividend, div];
      }
    }
  },
  7: {
    // レベル6の派生(0を立てるバージョン)。カードでは「6」バッジ＋サブ表記で
    // レベル6の仲間だとわかるように見せる
    title: 'レベル 6',
    desc: '百の位に「0」を\nたてて すすむ',
    badge: '6',
    badgeSub: '0をたてる',   // バッジ下の小ラベル
    variant: true,            // レベル6の派生であることを示す
    leadingZero: true,        // 百の位から商0を立てて割り進める解法
    fixed: [
      [256, 4], [128, 3], [245, 7], [156, 4], [378, 6],
      [186, 8], [168, 7], [275, 6], [342, 9], [234, 5]
    ],
    randomGen: () => {
      // 3桁÷1桁、百の位に商が立たない(百の位 < divisor) → 百の位に0を立てる
      while (true) {
        const div = rand(3, 9);
        const dividend = rand(100, 999);
        const firstDigit = Math.floor(dividend / 100);
        if (firstDigit < div) return [dividend, div];
      }
    }
  },
  8: {
    // 総合チャレンジ: レベル1〜6の問題からミックス出題
    title: 'チャレンジ',
    desc: 'レベル1〜6\nいろいろな もんだい',
    badge: '★',
    isChallenge: true,
    mixFrom: [1, 2, 3, 4, 5, 6],   // この6レベルから出題
    fixed: null,                    // 動的生成のため未使用
    randomGen: null
  }
};

const QUESTIONS_PER_LEVEL = 5;

function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

/* ---------- GAME STATE ---------- */
const state = {
  level: null,
  mode: 'fixed',
  questions: [],
  qIdx: 0,
  correctCount: 0,
  current: null
};

/* ---------- STEP COMPUTATION ---------- */
function computeSteps(dividend, divisor, leadingZeroMode = false) {
  const digits = String(dividend).split('').map(Number);
  const n = digits.length;
  const steps = [];

  let firstQuotientPosition = -1;
  if (leadingZeroMode) {
    // レベル7: 百の位(先頭)から商0を立てて割り進める解法
    // 先頭桁が割れなくてもスキップせず、position 0 から商0を立てる
    firstQuotientPosition = 0;
  } else {
    let p = 0, acc = 0;
    while (p < n) {
      acc = acc * 10 + digits[p];
      if (acc >= divisor) { firstQuotientPosition = p; break; }
      p++;
    }
  }

  let partial = 0;
  for (let i = 0; i < n; i++) {
    partial = partial * 10 + digits[i];
    if (i < firstQuotientPosition) continue;

    const q = Math.floor(partial / divisor);
    const product = q * divisor;
    const remainder = partial - product;

    steps.push({ kind: 'tateru', position: i, value: q, partial, product, remainder });
    steps.push({ kind: 'kakeru', position: i, value: product, partial, remainder });
    steps.push({ kind: 'hiku',   position: i, value: remainder, partial });

    if (i < n - 1) {
      steps.push({ kind: 'orosu', position: i + 1, value: digits[i + 1], broughtDown: digits[i + 1] });
      partial = remainder;
    } else {
      partial = remainder;
    }
  }

  return { steps, firstQuotientPosition, digits, leadingZeroMode,
           finalQuotient: Math.floor(dividend / divisor),
           finalRemainder: dividend % divisor };
}

function buildPlan(dividend, divisor, leadingZeroMode = false) {
  const result = computeSteps(dividend, divisor, leadingZeroMode);
  const { steps, firstQuotientPosition, digits } = result;

  const activeStages = [];
  for (const s of steps) {
    if (s.kind === 'tateru' && !activeStages.includes(s.position)) activeStages.push(s.position);
  }

  const stageData = {};
  for (const pos of activeStages) {
    stageData[pos] = { product: 0, remainder: 0, partialStart: 0, partialEnd: 0 };
  }

  let partial = 0;
  for (let i = 0; i < digits.length; i++) {
    partial = partial * 10 + digits[i];
    if (i < firstQuotientPosition) continue;
    const q = Math.floor(partial / divisor);
    const product = q * divisor;
    const remainder = partial - product;
    const start = (i === firstQuotientPosition) ? 0 : i;
    stageData[i].product = product;
    stageData[i].remainder = remainder;
    stageData[i].partialStart = start;
    stageData[i].partialEnd = i;
    partial = remainder;
  }

  return { ...result, steps, activeStages, stageData, n: digits.length };
}

/* ============================================================
   GRID LAYOUT
   方眼ノートのマス単位で座標を扱う:
   - col: 列 (0始まり、左から右)
   - row: 行 (0始まり、上から下)
   ÷の構造:
     row 0: 商
     row 1: わる数 ) | わられる数...
     row 2: かける結果（積）
     [横線]
     row 3: ひいた結果（あまり）+ おろされた数字
     row 4: 次の積
     [横線]
     row 5: 次のあまり ...

   各ステージは 2行(積→残り) を消費。
   おろす時は、ひいた結果の右隣に数字を配置する。
   ============================================================ */

function getCellSize() {
  const panel = document.getElementById('calcPanel');
  const w = panel.clientWidth  || window.innerWidth  * 0.45;
  const h = panel.clientHeight || window.innerHeight * 0.4;
  // 問題の最大行数(3桁問題=8行)と列数(4列)を基準に、マスが収まる最大サイズを算出
  const candH = Math.floor(h / 8.5);   // 縦: 余白込みで8.5行分
  const candW = Math.floor(w / 5.5);   // 横: 余白込みで5.5列分 (div+わる数)
  return Math.max(32, Math.min(candH, candW, 90));
}

/* ---------- DOMスナップショット & 復元 ----------
   リサイズ時に DOM を再構築しても入力済み内容を保持するため、
   現在の表示状態を捕捉して、再描画後に再適用する */
function captureDivisionSnapshot() {
  const c = state.current;
  if (!c) return null;
  const snap = { cells: {}, sublines: {}, hasRemainderTag: false };

  // 各セルの内容を捕捉
  const ids = [];
  for (let i = 0; i < c.n; i++) {
    ids.push(`q-${i}`, `d-${i}`);
  }
  for (const stagePos of c.plan.activeStages) {
    for (let i = 0; i < c.n; i++) {
      ids.push(`p-${stagePos}-${i}`, `r-${stagePos}-${i}`);
    }
  }
  for (const id of ids) {
    const el = document.getElementById(id);
    if (el) {
      snap.cells[id] = {
        text: el.textContent,
        faded: el.classList.contains('faded'),
        leadZero: el.classList.contains('lead-zero'),
        struck: el.classList.contains('struck')
      };
    }
  }

  // sublineの表示状態
  for (const stagePos of c.plan.activeStages) {
    const sl = document.getElementById(`subline-${stagePos}`);
    if (sl) snap.sublines[stagePos] = sl.style.display;
  }

  // あまりタグの有無
  const tag = document.querySelector('#division .remainder-tag');
  snap.hasRemainderTag = !!tag;

  return snap;
}

function applyDivisionSnapshot(snap) {
  if (!snap) return;
  // 各セルの内容を復元
  for (const id in snap.cells) {
    const el = document.getElementById(id);
    if (el) {
      el.textContent = snap.cells[id].text;
      if (snap.cells[id].faded) el.classList.add('faded');
      if (snap.cells[id].leadZero) el.classList.add('lead-zero');
      if (snap.cells[id].struck) el.classList.add('struck');
    }
  }
  // subline
  for (const stagePos in snap.sublines) {
    const sl = document.getElementById(`subline-${stagePos}`);
    if (sl) sl.style.display = snap.sublines[stagePos];
  }
  // あまりタグ
  if (snap.hasRemainderTag) {
    // showRemainderTag を再実行
    showRemainderTag();
  }
}

function renderDivision() {
  const c = state.current;
  const plan = c.plan;
  const { divisor, digits, n } = c;
  const activeStages = plan.activeStages;

  const cell = getCellSize();
  document.documentElement.style.setProperty('--cell', cell + 'px');

  const panel = document.getElementById('calcPanel');
  const div = document.getElementById('division');
  div.innerHTML = '';

  const DIVISOR_COL = 0;
  const FIRST_DIGIT_COL = 1;  // わる数のすぐ右隣に配置 (空列なし)
  const QUOTIENT_ROW = 0;
  const DIVIDEND_ROW = 1;

  const totalCols = n + 1;  // col=0:divisor, col=1..n:digits
  const totalRows = 2 + activeStages.length * 2;

  const divWidth = totalCols * cell;
  const divHeight = totalRows * cell;

  // panelのサイズを取得して、divisionをマス単位にスナップして中央寄せ
  const pw = panel.clientWidth;
  const ph = panel.clientHeight;
  // 中央位置を計算してから、cell単位に丸める
  const rawLeft = (pw - divWidth) / 2;
  const rawTop  = (ph - divHeight) / 2;
  const snapLeft = Math.round(rawLeft / cell) * cell;
  const snapTop  = Math.round(rawTop  / cell) * cell;

  div.style.width  = divWidth + 'px';
  div.style.height = divHeight + 'px';
  div.style.left = snapLeft + 'px';
  div.style.top  = snapTop + 'px';

  // 背景の方眼パターンを division の位置に合わせる
  // (panel全体に方眼を描画するが、divisionと完全に同期させる)
  document.documentElement.style.setProperty('--gx', snapLeft + 'px');
  document.documentElement.style.setProperty('--gy', snapTop + 'px');

  // ヘルパー
  function placeCell(col, row, content, opts = {}) {
    const el = document.createElement('div');
    el.className = 'cell';
    el.style.left = (col * cell) + 'px';
    el.style.top  = (row * cell) + 'px';
    el.textContent = content;
    if (opts.id) el.id = opts.id;
    if (opts.className) el.className += ' ' + opts.className;
    div.appendChild(el);
    return el;
  }
  function placeEmpty(col, row, id) {
    const el = document.createElement('div');
    el.className = 'cell';
    el.style.left = (col * cell) + 'px';
    el.style.top  = (row * cell) + 'px';
    el.id = id;
    div.appendChild(el);
    return el;
  }

  // 1. わる数 (col=0, row=1)
  const divisorEl = document.createElement('div');
  divisorEl.className = 'divisor-cell';
  divisorEl.style.left = (DIVISOR_COL * cell) + 'px';
  divisorEl.style.top  = (DIVIDEND_ROW * cell) + 'px';
  divisorEl.textContent = divisor;
  div.appendChild(divisorEl);

  // 2. ブラケット ")" の縦線
  // 重要: マス境界線上(col 0と col 1の境界=cell*1の位置)に配置
  const bracket = document.createElement('div');
  bracket.className = 'bracket-line';
  bracket.style.left = (cell * 1) + 'px';
  bracket.style.transform = 'translateX(-50%)';  // 境界線上に中央配置
  bracket.style.top  = (DIVIDEND_ROW * cell + cell * 0.1) + 'px';
  bracket.style.height = (cell * 0.8) + 'px';
  div.appendChild(bracket);

  // 3. 上の横線 (商の下) - col=1の左端から digit n本分
  const topBar = document.createElement('div');
  topBar.className = 'top-bar-line';
  topBar.style.left  = (cell * 1) + 'px';
  topBar.style.top   = (DIVIDEND_ROW * cell) + 'px';
  topBar.style.width = (cell * n) + 'px';
  div.appendChild(topBar);

  // 4. わられる数 (digits) を row=1 に配置
  for (let i = 0; i < n; i++) {
    placeCell(FIRST_DIGIT_COL + i, DIVIDEND_ROW, digits[i], { id: `d-${i}` });
  }

  // 5. 商の空マス (row=0)
  for (let i = 0; i < n; i++) {
    placeEmpty(FIRST_DIGIT_COL + i, QUOTIENT_ROW, `q-${i}`);
  }

  // 6. 各ステージの 積行 / 残り行 を配置
  activeStages.forEach((stagePos, stageIdx) => {
    const productRow   = 2 + stageIdx * 2;
    const remainderRow = 3 + stageIdx * 2;

    // 積行の各カラムに空セルを配置
    for (let i = 0; i < n; i++) {
      placeEmpty(FIRST_DIGIT_COL + i, productRow, `p-${stagePos}-${i}`);
    }
    // 残り行の各カラムに空セルを配置（ここに「あまり」と「おろした数字」が並ぶ）
    for (let i = 0; i < n; i++) {
      placeEmpty(FIRST_DIGIT_COL + i, remainderRow, `r-${stagePos}-${i}`);
    }

    // 積行と残り行の間の横線（後で表示）
    const subLine = document.createElement('div');
    subLine.className = 'sub-line';
    subLine.id = `subline-${stagePos}`;
    subLine.style.left  = (FIRST_DIGIT_COL * cell) + 'px';
    subLine.style.top   = ((productRow + 1) * cell) + 'px';
    subLine.style.width = (n * cell) + 'px';
    subLine.style.display = 'none';
    div.appendChild(subLine);
  });
}

/* ---------- SPOTLIGHT ---------- */
function clearSpotlight() {
  document.querySelectorAll('.cell.spot').forEach(c => c.classList.remove('spot'));
  clearHints();
}

/* ---------- HINT (固定モード時の計算ソース表示) ---------- */
function clearHints() {
  // hint-source クラスを削除
  document.querySelectorAll('.hint-source').forEach(c => c.classList.remove('hint-source'));
  // 演算記号ヒントを削除
  document.querySelectorAll('.op-hint').forEach(el => el.remove());
}

/* 計算に使う数字をヒント表示する
   step.kind に応じて、計算ソースとなるセルに hint-source クラスを付与し、
   間に演算記号(÷ × -)を配置する
   表示条件:
   - ランダムモードでは出さない
   - 固定モードでは:
     - 1〜3問目: 常に表示
     - 4〜5問目: hintRequested フラグが true のときのみ表示 */
function showHintForStep(step) {
  clearHints();
  if (state.mode === 'random') return;
  if (!step) return;

  // 4〜5問目はヒント要求されたときのみ表示
  const qNum = state.qIdx + 1;
  const autoShow = (qNum <= 3);
  if (!autoShow && !state.current.hintRequested) return;

  const c = state.current;
  const plan = c.plan;
  const stage = plan.stageData[step.position];
  const cell = getCellSize();

  // 該当ステップで計算に使う「左側ソース」のセルIDリストと「右側ソース」を返すヘルパー
  function highlight(ids) {
    ids.forEach(id => {
      const el = document.getElementById(id);
      if (el) el.classList.add('hint-source');
    });
  }

  // 2つのセル(またはセルグループ)の間に演算記号を配置する
  // leftIds と rightIds の中央の中間位置に op-hint を置く
  function placeOpHint(leftIds, rightIds, opSymbol) {
    const div = document.getElementById('division');
    if (!div) return;
    const allIds = [...leftIds, ...rightIds];
    if (allIds.length === 0) return;

    // 各セルの位置(left+width/2, top+height/2)を取得
    const positions = allIds.map(id => {
      const el = document.getElementById(id);
      if (!el) return null;
      // 数値で取得 (例: '75px' → 75)
      const l = parseFloat(el.style.left) || 0;
      const t = parseFloat(el.style.top) || 0;
      return { l: l + cell / 2, t: t + cell / 2 };
    }).filter(p => p);

    if (positions.length < 2) return;

    // 左ソースの右端 と 右ソースの左端 の中間に配置
    const leftPositions = leftIds.map(id => {
      const el = document.getElementById(id);
      return el ? parseFloat(el.style.left) + cell : null;
    }).filter(v => v !== null);
    const rightPositions = rightIds.map(id => {
      const el = document.getElementById(id);
      return el ? parseFloat(el.style.left) : null;
    }).filter(v => v !== null);

    if (leftPositions.length === 0 || rightPositions.length === 0) return;

    const leftEdge = Math.max(...leftPositions);
    const rightEdge = Math.min(...rightPositions);
    const centerX = (leftEdge + rightEdge) / 2;

    // 縦位置は左右ソースの中心の平均
    const allTops = positions.map(p => p.t);
    const centerY = allTops.reduce((a, b) => a + b, 0) / allTops.length;

    const opSize = cell * 0.55;
    const op = document.createElement('div');
    op.className = 'op-hint';
    op.style.left = (centerX - opSize / 2) + 'px';
    op.style.top  = (centerY - opSize / 2) + 'px';
    op.textContent = opSymbol;
    div.appendChild(op);
  }

  if (step.kind === 'tateru') {
    // 「○ ÷ ◇ は…?」: partial の数字 と divisor を強調
    const partialIds = getPartialCellIds(step.position);
    const divisorEl = document.querySelector('.divisor-cell');
    if (divisorEl) divisorEl.classList.add('hint-source');
    highlight(partialIds);
    // ÷ 記号を divisor の左上に配置 (数字には被らない)
    placeOpHintAtDivisorCorner('÷');
  }
  else if (step.kind === 'kakeru') {
    // 「○ × ◇ は…?」: 商の今立てた数字 と divisor を強調
    const qId = `q-${step.position}`;
    const qEl = document.getElementById(qId);
    if (qEl) qEl.classList.add('hint-source');
    const divisorEl = document.querySelector('.divisor-cell');
    if (divisorEl) divisorEl.classList.add('hint-source');
    // × 記号を 商マス と divisor の間に置く
    // ただし商マスは row=0, divisorは row=1 なので、両者を結ぶ位置(対角線の中点)に
    placeOpHintBetweenCells(qId, null, '×', { useDivisor: true });
  }
  else if (step.kind === 'hiku') {
    // 「○ - ◇ は…?」: partial と product を強調
    const partialIds = getPartialCellIds(step.position);
    const prodLen = String(stage.product).length;
    const prodStartCol = stage.partialEnd - prodLen + 1;
    const prodIds = [];
    for (let i = prodStartCol; i <= stage.partialEnd; i++) {
      prodIds.push(`p-${step.position}-${i}`);
    }
    highlight(partialIds);
    highlight(prodIds);
    // − 記号を product 行の左隣マスに配置 (教科書通りの位置)
    placeOpHintLeftOfProduct(prodIds, '−');
  }
  // orosu はヒント不要(既存のドロップアニメで十分)
}

/* 与えられた position に対する partial を構成するセルIDリストを返す
   - 初回ステージ: dividend digits の partialStart..partialEnd
   - 2回目以降: 前ステージの remainder 行で数字が表示されているセル全て */
function getPartialCellIds(position) {
  const c = state.current;
  const plan = c.plan;
  const stage = plan.stageData[position];
  const stageIdx = plan.activeStages.indexOf(position);
  const ids = [];
  if (stageIdx === 0) {
    for (let i = stage.partialStart; i <= stage.partialEnd; i++) {
      ids.push(`d-${i}`);
    }
  } else {
    const prevStage = plan.activeStages[stageIdx - 1];
    for (let i = 0; i < c.n; i++) {
      const el = document.getElementById(`r-${prevStage}-${i}`);
      if (!el || el.textContent === '') continue;
      // 薄字(faded)の0はpartialの計算には意味があるが、視覚的にはノイズになるので
      // hint-source対象から除外する (例: 「09÷3」と見えて混乱するのを防ぐ)
      if (el.classList.contains('faded')) continue;
      ids.push(`r-${prevStage}-${i}`);
    }
  }
  return ids;
}

/* ÷ 記号を divisor の真下(空きマス)に配置 (数字に被らない) */
function placeOpHintAtDivisorCorner(opSymbol) {
  const div = document.getElementById('division');
  const divisorEl = document.querySelector('.divisor-cell');
  if (!div || !divisorEl) return;
  const cell = getCellSize();

  const dLeft = parseFloat(divisorEl.style.left);
  const dTop  = parseFloat(divisorEl.style.top);

  // 配置: divisor のちょうど真下のマス(空き)に置く
  // divisorは col=0, row=1 → その真下(col=0, row=2)は積行の左端で空きスペース
  const opSize = cell * 0.55;
  const cx = dLeft + cell / 2;        // divisorと同じ列の中央
  const cy = dTop + cell + cell / 2;  // 1マス下の中央

  const op = document.createElement('div');
  op.className = 'op-hint';
  op.style.left = (cx - opSize / 2) + 'px';
  op.style.top  = (cy - opSize / 2) + 'px';
  op.textContent = opSymbol;
  div.appendChild(op);
}

/* − 記号を product 行の左隣マスに配置 (算数教科書通り) */
function placeOpHintLeftOfProduct(prodIds, opSymbol) {
  const div = document.getElementById('division');
  if (!div || prodIds.length === 0) return;
  const cell = getCellSize();

  // product の最左セルの位置を取得
  const leftMostId = prodIds[0]; // prodIdsは左から右の順
  const el = document.getElementById(leftMostId);
  if (!el) return;
  const pLeft = parseFloat(el.style.left);
  const pTop  = parseFloat(el.style.top);

  // product 行の1マス左の中央に配置
  // ただしバッジサイズはcell*0.55なので、マス中央に来るよう調整
  const opSize = cell * 0.55;
  const cx = pLeft - cell / 2;      // 左隣マスの中央
  const cy = pTop + cell / 2;       // product行の中央高さ

  const op = document.createElement('div');
  op.className = 'op-hint';
  op.style.left = (cx - opSize / 2) + 'px';
  op.style.top  = (cy - opSize / 2) + 'px';
  op.textContent = opSymbol;
  div.appendChild(op);
}

/* 商マス (q-X) と divisor を結ぶ位置に演算記号を配置 (× 用) */
function placeOpHintBetweenCells(qId, _unused, opSymbol, opts) {
  const div = document.getElementById('division');
  const qEl = document.getElementById(qId);
  const divisorEl = document.querySelector('.divisor-cell');
  if (!div || !qEl || !divisorEl) return;
  const cell = getCellSize();

  const qLeft = parseFloat(qEl.style.left);
  const qTop  = parseFloat(qEl.style.top);
  const dLeft = parseFloat(divisorEl.style.left);
  const dTop  = parseFloat(divisorEl.style.top);

  // 中点
  const cx = (qLeft + cell / 2 + dLeft + cell / 2) / 2;
  const cy = (qTop + cell / 2 + dTop + cell / 2) / 2;

  const opSize = cell * 0.55;
  const op = document.createElement('div');
  op.className = 'op-hint';
  op.style.left = (cx - opSize / 2) + 'px';
  op.style.top  = (cy - opSize / 2) + 'px';
  op.textContent = opSymbol;
  div.appendChild(op);
}

function spotlightForStep(step) {
  clearSpotlight();
  const plan = state.current.plan;
  if (!step) return;
  const stage = plan.stageData[step.position];

  // ※ 黄色のスポットは「答えを書く場所」のみに付ける
  //   (計算ソースは緑のパルスで showHintForStep が表示する)

  if (step.kind === 'tateru') {
    // 答えを書く場所 = 商マスのみ
    const q = document.getElementById(`q-${step.position}`);
    if (q) q.classList.add('spot');
  }
  else if (step.kind === 'kakeru') {
    // 答えを書く場所 = 積を書くマス
    const prodLen = String(stage.product).length;
    const startCol = stage.partialEnd - prodLen + 1;
    for (let i = startCol; i <= stage.partialEnd; i++) {
      const c = document.getElementById(`p-${step.position}-${i}`);
      if (c) c.classList.add('spot');
    }
  }
  else if (step.kind === 'hiku') {
    // 答えを書く場所 = ひいた結果を書くマス
    const remLen = String(stage.remainder).length || 1;
    const startCol = stage.partialEnd - remLen + 1;
    for (let i = startCol; i <= stage.partialEnd; i++) {
      const c = document.getElementById(`r-${step.position}-${i}`);
      if (c) c.classList.add('spot');
    }
  }
  else if (step.kind === 'orosu') {
    // 答えを書く場所 = おろした数字を書くマス (前のステージのremainder行の該当列)
    const prevActive = [...plan.activeStages].filter(p => p < step.position).pop();
    if (prevActive !== undefined) {
      const c = document.getElementById(`r-${prevActive}-${step.position}`);
      if (c) c.classList.add('spot');
    }
  }
}

/* ---------- STEP HINT TEXT ---------- */
const STEP_NAMES_JA = {
  tateru: 'たてる', kakeru: 'かける', hiku: 'ひく', orosu: 'おろす'
};

function updateStepHint() {
  const c = state.current;
  if (!c) return;
  const step = c.plan.steps[c.stepIdx];
  const stepHint = document.getElementById('stepHint');
  const numHint = document.getElementById('numHint');

  document.querySelectorAll('.step-btn').forEach(b => b.classList.remove('next'));

  if (!step) {
    stepHint.textContent = 'できた！';
    numHint.textContent = 'できた！';
    return;
  }

  // ランダムモードでは「ヒント」を出さない（次に押すべき手順を教えない）
  const isRandom = (state.mode === 'random');

  if (isRandom) {
    stepHint.textContent = 'つぎの てじゅんは…?';
  } else {
    stepHint.textContent = `つぎは「${STEP_NAMES_JA[step.kind]}」だよ`;
  }

  if (c.stepConfirmed) {
    const stage = c.plan.stageData[step.position];
    if (step.kind === 'tateru') numHint.textContent = `${step.partial} ÷ ${c.divisor} は…?`;
    else if (step.kind === 'kakeru') {
      const tateruStep = c.plan.steps.filter(s => s.kind === 'tateru' && s.position === step.position)[0];
      const q = tateruStep ? tateruStep.value : '?';
      numHint.textContent = `${q} × ${c.divisor} は…?`;
    }
    else if (step.kind === 'hiku')  numHint.textContent = `${step.partial} - ${stage.product} は…?`;
    else if (step.kind === 'orosu') numHint.textContent = `${step.value} を おろそう`;
  } else {
    numHint.textContent = 'てじゅんを えらんでね';
    // 固定モードでのみ、次に押すべきボタンに 'next' クラスを付けて
    // 青枠＋揺れアニメで視覚的にヒントを出す
    if (!isRandom) {
      const btn = document.querySelector(`.step-btn[data-step="${step.kind}"]`);
      if (btn) btn.classList.add('next');
    }
  }
}

/* ---------- INPUT EXPECTATIONS ---------- */
function getExpectedDigits(step) {
  const c = state.current;
  if (step.kind === 'tateru') return [String(step.value)];
  if (step.kind === 'orosu')  return [String(step.value)];
  if (step.kind === 'kakeru') {
    const stage = c.plan.stageData[step.position];
    // 積の桁数 = partialの桁数（左ゼロ埋めしない＝積の自然な桁数で表示）
    // 例: 47÷3で stage 0 は partial=4, product=3 → 1桁
    //     234÷5で stage 1 は partial=23, product=20 → 2桁
    return String(stage.product).split('');
  }
  if (step.kind === 'hiku') {
    const stage = c.plan.stageData[step.position];
    return String(stage.remainder).split('');
  }
  return [];
}

function getInputCellIds(step) {
  const c = state.current;
  const plan = c.plan;
  if (step.kind === 'tateru') return [`q-${step.position}`];
  if (step.kind === 'orosu') {
    // おろし先 = 前のステージの remainder 行の、step.position 列
    // (=ひいた結果の右隣)
    const prevActive = [...plan.activeStages].filter(p => p < step.position).pop();
    if (prevActive !== undefined) return [`r-${prevActive}-${step.position}`];
    return [`d-${step.position}`];
  }
  if (step.kind === 'kakeru') {
    const stage = plan.stageData[step.position];
    const len = String(stage.product).length;
    const startCol = stage.partialEnd - len + 1;
    const ids = [];
    for (let i = startCol; i <= stage.partialEnd; i++) ids.push(`p-${step.position}-${i}`);
    return ids;
  }
  if (step.kind === 'hiku') {
    const stage = plan.stageData[step.position];
    const len = String(stage.remainder).length;
    const startCol = stage.partialEnd - len + 1;
    const ids = [];
    for (let i = startCol; i <= stage.partialEnd; i++) ids.push(`r-${step.position}-${i}`);
    return ids;
  }
  return [];
}

/* ---------- HANDLERS ---------- */
function handleStepClick(stepKind) {
  const c = state.current;
  if (!c || c.completed) return;
  const expected = c.plan.steps[c.stepIdx];
  if (!expected) return;
  if (c.stepConfirmed) return;

  // 操作があったのでアイドルタイマーリセット
  resetIdleTimer();

  if (stepKind === expected.kind) {
    c.stepConfirmed = true;
    c.inputBuffer = [];
    enableNumpad(true);
    spotlightForStep(expected);
    showHintForStep(expected);  // 固定モードのときは計算ソースを強調表示
    updateStepHint();
  } else {
    const btn = document.querySelector(`.step-btn[data-step="${stepKind}"]`);
    if (btn) {
      btn.classList.add('wrong');
      setTimeout(() => btn.classList.remove('wrong'), 600);
    }
    c.errorCount++;
    // 誤答時: 4〜5問目でヒント未要求なら、ヒントボタンを点滅
    triggerHintAttention();
  }
}

function handleNumClick(num) {
  const c = state.current;
  if (!c || c.completed || !c.stepConfirmed) return;
  const step = c.plan.steps[c.stepIdx];
  if (!step) return;

  // 操作があったのでアイドルタイマーリセット
  resetIdleTimer();

  const expected = getExpectedDigits(step);
  const cellIds = getInputCellIds(step);
  const bufIdx = c.inputBuffer.length;

  if (String(num) === expected[bufIdx]) {
    c.inputBuffer.push(String(num));
    const cellId = cellIds[bufIdx];
    const cell = document.getElementById(cellId);
    if (cell) {
      if (step.kind === 'orosu') {
        // おろすアニメーション: 数字が上から下りてくる
        cell.textContent = num;
        cell.classList.add('drop-anim');
        setTimeout(() => cell.classList.remove('drop-anim'), 700);
      } else {
        cell.textContent = num;
        cell.classList.add('correct-pop', 'fade-in');
        setTimeout(() => cell.classList.remove('correct-pop'), 500);

        // leadingZeroモード: 商の百の位(position 0)に立てた「0」は
        // 答えとしては不要なので薄く表示する。問題完了時に斜線で消す。
        if (step.kind === 'tateru' && c.plan.leadingZeroMode &&
            step.position === 0 && num === 0) {
          cell.classList.add('faded', 'lead-zero');
        }

        // hikuステップで「結果が0かつ1桁」かつ「最終ステージではない」場合、
        // その0を薄く表示する (例: 648÷2 で 6-6=0 のような場面)
        // → 後で「おろす」で右隣に数字が来ると「0X」のような不自然な表記になるのを防ぐ
        if (step.kind === 'hiku' && num === 0 && expected.length === 1) {
          // 最終ステージかどうか判定: このstep.positionが activeStagesの最後か
          const isLastStage = c.plan.activeStages[c.plan.activeStages.length - 1] === step.position;
          if (!isLastStage) {
            cell.classList.add('faded');
          }
        }
      }
    }

    if (c.inputBuffer.length === expected.length) {
      // ステップ完了
      if (step.kind === 'kakeru') {
        const sub = document.getElementById(`subline-${step.position}`);
        if (sub) sub.style.display = 'block';
      }
      advanceStep();
    }
  } else {
    // 間違い: セルには何も入れない（バグ防止）。代わりにテンキーを振動させ、
    // 該当セルを赤く点滅させる。
    const cellId = cellIds[bufIdx];
    const cell = document.getElementById(cellId);
    if (cell) {
      // 赤フラッシュのみ（textContentは触らない）
      cell.classList.add('error');
      setTimeout(() => cell.classList.remove('error'), 1200);
    }
    // テンキーボタンも振動させる
    const numBtn = document.querySelector(`.num-btn[data-num="${num}"]`);
    if (numBtn) {
      numBtn.classList.add('wrong');
      setTimeout(() => numBtn.classList.remove('wrong'), 600);
    }
    c.errorCount++;
    // 誤答時: 4〜5問目でヒント未要求なら、ヒントボタンを点滅
    triggerHintAttention();
  }
}

function advanceStep() {
  const c = state.current;
  c.stepConfirmed = false;
  c.inputBuffer = [];
  c.stepIdx++;
  enableNumpad(false);
  clearSpotlight();

  if (c.stepIdx >= c.plan.steps.length) {
    // 問題完了
    c.completed = true;
    if (c.errorCount <= 1) state.correctCount++;
    document.getElementById('correctDisplay').textContent = state.correctCount;
    clearIdleTimer();  // 問題完了時はタイマー不要
    strikeLeadingZero();  // leadingZeroモード: 不要な先頭の0に斜線を引いて消す
    showRemainderTag();
    showCorrectMark();
  } else {
    updateStepHint();
  }
}

/* leadingZeroモードの商の先頭「0」に斜線を引いて「消した」ことを示す
   (教科書的な「いらない0は消す」表現) */
function strikeLeadingZero() {
  const c = state.current;
  if (!c || !c.plan.leadingZeroMode) return;
  const cell = document.getElementById('q-0');
  if (cell && cell.classList.contains('lead-zero')) {
    cell.classList.add('struck');
  }
}

function showRemainderTag() {
  const c = state.current;
  if (!c || c.plan.finalRemainder === 0) return;
  // dividend row（row=1）の右側にあまりを表示
  // ※ 簡易的に右下に表示
  const div = document.getElementById('division');
  const cell = getCellSize();
  const tag = document.createElement('div');
  tag.className = 'remainder-tag';
  tag.innerHTML = `<span class="label">あまり</span><span class="value">${c.plan.finalRemainder}</span>`;
  tag.style.left = ((1 + c.n + 0.3) * cell) + 'px';
  tag.style.top  = (1 * cell + cell * 0.3) + 'px';
  div.appendChild(tag);
}

/* ---------- 正解マーク表示 ---------- */
function showCorrectMark() {
  const maru = document.getElementById('bigMaru');
  const nextBtn = document.getElementById('nextQBtn');

  maru.style.display = 'flex';

  // 筆算に重ならないように赤丸・せいかいテキストの位置とサイズを決める
  positionCorrectMark();

  // SVGラップのアニメ
  const wrap = maru.querySelector('.maru-svg-wrap');
  if (wrap) {
    wrap.style.animation = 'none';
    void wrap.offsetWidth;
    wrap.style.animation = 'maruDraw 0.6s cubic-bezier(0.34, 1.2, 0.64, 1) forwards';
  }
  // 円のstrokeアニメ
  const circle = maru.querySelector('circle');
  if (circle) {
    circle.style.animation = 'none';
    void circle.offsetWidth;
    circle.style.animation = 'maruStroke 0.7s ease-out forwards';
  }
  // 「せいかい！」テキストのアニメ
  const seikai = maru.querySelector('.seikai-text');
  if (seikai) {
    seikai.style.animation = 'none';
    void seikai.offsetWidth;
    seikai.style.animation = 'textPop 0.4s 0.6s forwards';
  }

  // 「つぎへ」ボタンを表示
  nextBtn.style.animation = 'none';
  void nextBtn.offsetWidth;
  nextBtn.style.animation = 'nextBtnIn 0.5s 0.8s both';
  nextBtn.classList.add('show');

  nextBtn.onclick = goNextQuestion;
}

/* 正解マーク(○・せいかい！)を筆算に重ならない空きスペースに配置する。
   筆算(#division)の領域を取得し、
   - 「下側の空き高さ」と「右側の空き幅」を比べ、広い方の空きエリアに配置
   - そのエリアの短辺に収まるよう赤丸のサイズを決める
   さらに「つぎのもんだいへ」ボタンも筆算の最下端より下に来るよう調整する */
function positionCorrectMark() {
  const maru = document.getElementById('bigMaru');
  const wrap = maru.querySelector('.maru-svg-wrap');
  const panel = document.getElementById('calcPanel');
  const division = document.getElementById('division');
  if (!maru || !wrap || !panel || !division) return;

  const pw = panel.clientWidth;
  const ph = panel.clientHeight;

  // 筆算の領域 (calcPanel内のローカル座標)
  const divLeft   = parseFloat(division.style.left) || 0;
  const divTop    = parseFloat(division.style.top)  || 0;
  const divWidth  = parseFloat(division.style.width)  || division.clientWidth;
  const divHeight = parseFloat(division.style.height) || division.clientHeight;
  const divRight  = divLeft + divWidth;
  const divBottom = divTop + divHeight;

  const PAD = 12; // 筆算とマークの間の最小余白(px)

  // 空きエリア候補: 下側 と 右側
  const belowH = ph - divBottom;        // 筆算の下の空き高さ
  const rightW = pw - divRight;         // 筆算の右の空き幅

  // 赤丸が確保できる最大の正方形サイズを各エリアで算出
  // 下側エリア: 幅=パネル全幅, 高さ=belowH
  const belowSize = Math.min(pw * 0.9, Math.max(0, belowH - PAD * 2));
  // 右側エリア: 幅=rightW, 高さ=パネル全高
  const rightSize = Math.min(ph * 0.75, Math.max(0, rightW - PAD * 2));

  // マーク本体(○+せいかい)を absolute なボックスとして配置する設定にする
  maru.style.inset = 'auto';
  maru.style.justifyContent = 'center';
  maru.style.alignItems = 'center';

  let boxLeft, boxTop, boxW, boxH, size;

  if (belowSize >= rightSize && belowSize >= 80) {
    // 下側に配置
    size = belowSize;
    boxW = pw;
    boxH = belowH;
    boxLeft = 0;
    boxTop = divBottom;
  } else if (rightSize >= 80) {
    // 右側に配置
    size = rightSize;
    boxW = rightW;
    boxH = ph;
    boxLeft = divRight;
    boxTop = 0;
  } else {
    // どちらの余白も狭い場合: パネル全体に小さめ表示(従来挙動に近いフォールバック)
    size = Math.min(pw, ph) * 0.5;
    boxW = pw;
    boxH = ph;
    boxLeft = 0;
    boxTop = 0;
  }

  maru.style.left   = boxLeft + 'px';
  maru.style.top    = boxTop + 'px';
  maru.style.width  = boxW + 'px';
  maru.style.height = boxH + 'px';

  // 赤丸サイズを設定(せいかいテキストの分を少し残す)
  const circleSize = Math.max(60, size * 0.78);
  wrap.style.width  = circleSize + 'px';
  wrap.style.height = circleSize + 'px';
  wrap.style.maxWidth  = '95%';
  wrap.style.maxHeight = '70%';

  // 「つぎのもんだいへ」ボタンを筆算の最下端より下に置く
  // (筆算が縦に長い問題で、ボタンが筆算に重なるのを防ぐ)
  const nextBtn = document.getElementById('nextQBtn');
  if (nextBtn) {
    // ボタン高さ概算(レンダリング前なので一旦表示して測る)
    const prevDisplay = nextBtn.style.display;
    nextBtn.style.visibility = 'hidden';
    nextBtn.style.display = 'block';
    const btnH = nextBtn.offsetHeight || 56;
    nextBtn.style.display = prevDisplay;
    nextBtn.style.visibility = '';

    // 筆算下端 + 余白 を基準にしつつ、パネル下端からはみ出さない位置に
    const desiredTop = divBottom + PAD;
    const maxTop = ph - btnH - PAD;
    let btnTop = Math.min(desiredTop, maxTop);
    // 下側にマークを置いた場合は、マークとボタンが重ならないよう最下部へ寄せる
    if (boxTop === divBottom && boxLeft === 0) {
      btnTop = ph - btnH - PAD;
    }
    if (btnTop < PAD) btnTop = PAD;
    nextBtn.style.bottom = 'auto';
    nextBtn.style.top = btnTop + 'px';
  }
}

function goNextQuestion() {
  const maru = document.getElementById('bigMaru');
  const nextBtn = document.getElementById('nextQBtn');
  maru.style.display = 'none';
  nextBtn.classList.remove('show');
  // 次回の正解時に positionCorrectMark で再計算できるよう、
  // 動的に設定したインラインスタイルをクリアしておく
  maru.style.left = '';
  maru.style.top = '';
  maru.style.width = '';
  maru.style.height = '';
  maru.style.inset = '';
  nextBtn.style.top = '';
  nextBtn.style.bottom = '';

  state.qIdx++;
  if (state.qIdx >= state.questions.length) {
    showResults();
  } else {
    loadQuestion();
  }
}

/* ---------- NUMPAD ENABLE ---------- */
function enableNumpad(on) {
  const pad = document.getElementById('numpadPanel');
  if (on) pad.classList.remove('disabled');
  else pad.classList.add('disabled');
}

/* ---------- LOAD QUESTION ---------- */
function loadQuestion() {
  const q = state.questions[state.qIdx];
  const dividend = q[0], divisor = q[1];
  // 出題元レベル(チャレンジ時は問題ごとに異なる)。未指定なら現在のレベル
  const srcLv = (q[2] !== undefined) ? q[2] : state.level;
  state.currentSrcLevel = srcLv;
  const leadingZero = !!(LEVELS[srcLv] && LEVELS[srcLv].leadingZero);
  const plan = buildPlan(dividend, divisor, leadingZero);
  state.current = {
    dividend, divisor, plan,
    digits: plan.digits, n: plan.n,
    srcLv,
    stepIdx: 0, stepConfirmed: false, inputBuffer: [],
    errorCount: 0, completed: false,
    hintRequested: false  // 4〜5問目で「ヒントを見せて」と要求されたか
  };
  document.getElementById('qNumDisplay').textContent = state.qIdx + 1;
  document.getElementById('qTotalDisplay').textContent = state.questions.length;
  // ランダムモードでは、毎問「たてる/かける/ひく/おろす」の表示順をシャッフル
  shuffleStepButtons(state.mode === 'random');
  // 計算ヒントボタンの表示制御
  updateCalcHintButton();
  renderDivision();
  updateStepHint();
  enableNumpad(false);
  clearSpotlight();
  // アイドルタイマー開始 (4〜5問目で点滅させるため)
  resetIdleTimer();
}

/* 計算ヒントボタン (💡) の状態を更新
   - ランダムモード: 完全に非表示 (ヒント機能も九九表機能も使わない)
   - 固定モード: 常時表示、active/attention クラスのみ問題に応じて切り替え */
function updateCalcHintButton() {
  const btn = document.getElementById('hintBtn');
  if (!btn) return;
  // 新問題開始時は active/attention 解除
  btn.classList.remove('attention', 'active');
  // ランダムモードでは非表示
  if (state.mode === 'random') {
    btn.style.display = 'none';
  } else {
    btn.style.display = '';
  }
}

/* ---------- アイドル検知 ---------- */
let idleTimer = null;
const IDLE_MS = 10000; // 10秒
function resetIdleTimer() {
  if (idleTimer) clearTimeout(idleTimer);
  // 既にヒント要求済みなら点滅させる必要なし
  if (!state.current || state.current.hintRequested) return;
  const qNum = state.qIdx + 1;
  // 固定モードかつ4〜5問目のみ点滅対象
  if (state.mode !== 'fixed' || qNum <= 3) return;
  idleTimer = setTimeout(() => {
    triggerHintAttention();
  }, IDLE_MS);
}

function clearIdleTimer() {
  if (idleTimer) clearTimeout(idleTimer);
  idleTimer = null;
}

/* ヒントボタンに「ここを押して」と気づかせる点滅 */
function triggerHintAttention() {
  const btn = document.getElementById('hintBtn');
  if (!btn) return;
  // 既に要求済みなら点滅不要
  if (state.current && state.current.hintRequested) return;
  // 固定モードかつ4〜5問目のみ点滅対象
  const qNum = state.qIdx + 1;
  if (state.mode !== 'fixed' || qNum <= 3) return;
  btn.classList.add('attention');
}

/* ---------- STEP BUTTONS SHUFFLE ----------
   ランダムモードでは毎問ボタンの並び順をシャッフルする
   (DOMの順番は変えず CSS の order プロパティで表示順だけ変更) */
function shuffleStepButtons(shouldShuffle) {
  const grid = document.getElementById('stepGrid');
  if (!grid) return;
  const buttons = grid.querySelectorAll('.step-btn');
  if (!shouldShuffle) {
    // 固定モード: 元の並び順 (たてる→かける→ひく→おろす)
    buttons.forEach(b => { b.style.order = ''; });
    return;
  }
  // Fisher-Yates シャッフルで 0..3 の順序を生成
  const order = [0, 1, 2, 3];
  for (let i = order.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [order[i], order[j]] = [order[j], order[i]];
  }
  buttons.forEach((btn, idx) => {
    btn.style.order = order[idx];
  });
}

/* ---------- BUILD QUESTION SET ---------- */
function buildQuestionSet() {
  const lvl = LEVELS[state.level];

  // ----- チャレンジレベル: レベル1〜6からミックス出題 -----
  if (lvl.isChallenge) {
    buildChallengeSet(lvl);
    state.qIdx = 0;
    state.correctCount = 0;
    document.getElementById('correctDisplay').textContent = 0;
    document.getElementById('levelDisplay').textContent = lvl.badge || '★';
    return;
  }

  if (state.mode === 'fixed') {
    // [dividend, divisor] に出題元レベル(=自分)を付けて [d, v, srcLv] 形式に統一
    state.questions = lvl.fixed.slice(0, QUESTIONS_PER_LEVEL)
      .map(q => [q[0], q[1], state.level]);
  } else {
    state.questions = [];
    const seen = new Set();
    while (state.questions.length < QUESTIONS_PER_LEVEL) {
      const q = lvl.randomGen();
      const key = q.join(',');
      if (!seen.has(key)) { seen.add(key); state.questions.push([q[0], q[1], state.level]); }
    }
  }
  state.qIdx = 0;
  state.correctCount = 0;
  document.getElementById('correctDisplay').textContent = 0;
  document.getElementById('levelDisplay').textContent = lvl.badge || state.level;
}

/* チャレンジ用: レベル1〜6から各レベルの問題をミックスして出題セットを作る
   各問題に出題元レベル(srcLv)を付与し、loadQuestionが解法(leadingZero等)を切り替えられるようにする
   - 固定モード: 各出題元レベルから問題を均等に拾い、シャッフルして QUESTIONS_PER_LEVEL 問に
   - ランダムモード: 出題元レベルをランダムに選んでそのレベルのrandomGenで生成 */
function buildChallengeSet(lvl) {
  const sources = lvl.mixFrom;   // [1..6]
  state.questions = [];
  const seen = new Set();

  if (state.mode === 'fixed') {
    // 各レベルの固定問題プールを集めて [d, v, srcLv] のリストにする
    const pool = [];
    for (const lv of sources) {
      for (const q of LEVELS[lv].fixed) {
        pool.push([q[0], q[1], lv]);
      }
    }
    // シャッフル(Fisher-Yates)
    for (let i = pool.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [pool[i], pool[j]] = [pool[j], pool[i]];
    }
    // できるだけ出題元レベルが重複しすぎないように、先頭から重複なしで拾う
    for (const item of pool) {
      const key = item[0] + ',' + item[1] + ',' + item[2];
      if (seen.has(key)) continue;
      seen.add(key);
      state.questions.push(item);
      if (state.questions.length >= QUESTIONS_PER_LEVEL) break;
    }
  } else {
    // ランダム: 出題元レベルをランダムに選び、そのレベルのrandomGenで生成
    let guard = 0;
    while (state.questions.length < QUESTIONS_PER_LEVEL && guard < 500) {
      guard++;
      const lv = sources[Math.floor(Math.random() * sources.length)];
      const q = LEVELS[lv].randomGen();
      const key = q[0] + ',' + q[1] + ',' + lv;
      if (seen.has(key)) continue;
      seen.add(key);
      state.questions.push([q[0], q[1], lv]);
    }
  }
}

/* ---------- SCREEN MANAGEMENT ---------- */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ---------- TITLE SCREEN SETUP ---------- */
function setupTitleScreen() {
  const grid = document.getElementById('levelGrid');
  grid.innerHTML = '';
  for (let i = 1; i <= 8; i++) {
    const lvl = LEVELS[i];
    const card = document.createElement('button');
    card.className = 'level-card';
    if (lvl.variant) card.classList.add('variant');
    if (lvl.isChallenge) card.classList.add('challenge');
    card.dataset.level = i;

    // バッジ(番号 or ★)。派生レベルは番号下に小ラベルを出す
    const badge = lvl.badge || String(i);
    const topLabel = lvl.isChallenge ? 'CHALLENGE' : 'LEVEL';
    const subBadge = lvl.badgeSub ? `<span class="lv-sub">${lvl.badgeSub}</span>` : '';

    card.innerHTML = `
      <div class="lv-num"><small>${topLabel}</small>${badge}${subBadge}</div>
      <div class="lv-title">${lvl.title}</div>
      <div class="lv-desc">${lvl.desc.replace('\n', '<br>')}</div>
    `;
    card.onclick = () => {
      document.querySelectorAll('.level-card').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
      state.level = i;
      updateStartBtn();
    };
    grid.appendChild(card);
  }

  document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      state.mode = btn.dataset.mode;
    };
  });

  document.getElementById('startBtn').onclick = () => {
    if (!state.level) return;
    buildQuestionSet();
    showScreen('mainScreen');
    // レイアウトを正確に計算するため少し待つ
    requestAnimationFrame(() => loadQuestion());
  };
}

function updateStartBtn() {
  document.getElementById('startBtn').disabled = !state.level;
}

/* ---------- KUKU TABLE ---------- */
function buildKukuTable() {
  const tbl = document.getElementById('kukuTable');
  tbl.innerHTML = '';
  const corner = document.createElement('div');
  corner.className = 'kuku-cell kuku-header';
  corner.textContent = '×';
  tbl.appendChild(corner);
  for (let c = 1; c <= 9; c++) {
    const h = document.createElement('div');
    h.className = 'kuku-cell kuku-header';
    h.textContent = c;
    tbl.appendChild(h);
  }
  for (let r = 1; r <= 9; r++) {
    const rh = document.createElement('div');
    rh.className = 'kuku-cell kuku-row-header';
    rh.textContent = r;
    tbl.appendChild(rh);
    for (let c = 1; c <= 9; c++) {
      const cell = document.createElement('div');
      cell.className = 'kuku-cell';
      cell.textContent = r * c;
      tbl.appendChild(cell);
    }
  }
}

/* ---------- HINT MODAL ---------- */
function setupHintModal() {
  const modal = document.getElementById('hintModal');
  const btn = document.getElementById('hintBtn');
  document.getElementById('hintCloseBtn').onclick = () => modal.classList.remove('active');
  modal.onclick = (e) => { if (e.target === modal) modal.classList.remove('active'); };

  /* 💡ボタンのタップ/長押し処理
     - タップ (短く押す): 計算ヒントON (固定モード4〜5問目で有効)
     - 長押し (500ms以上): 九九表モーダル表示 */
  const LONG_PRESS_MS = 500;
  let pressTimer = null;
  let longPressed = false;

  function startPress(e) {
    e.preventDefault();
    longPressed = false;
    btn.classList.add('pressing');
    pressTimer = setTimeout(() => {
      // 長押し → 九九表表示
      longPressed = true;
      btn.classList.remove('pressing');
      modal.classList.add('active');
      // 触覚フィードバック (対応端末のみ)
      if (navigator.vibrate) navigator.vibrate(30);
    }, LONG_PRESS_MS);
  }
  function endPress(e) {
    if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
    btn.classList.remove('pressing');
    if (longPressed) return; // 長押し済みならタップ処理しない
    // タップ処理: 計算ヒントON
    handleHintButtonTap();
  }
  function cancelPress() {
    if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
    btn.classList.remove('pressing');
    longPressed = true; // タップとして処理されないようにする
  }

  // タッチ/マウス両対応
  btn.addEventListener('touchstart', startPress, { passive: false });
  btn.addEventListener('touchend', endPress);
  btn.addEventListener('touchcancel', cancelPress);
  btn.addEventListener('mousedown', startPress);
  btn.addEventListener('mouseup', endPress);
  btn.addEventListener('mouseleave', cancelPress);
}

/* タップ時の処理: 計算ヒントON */
function handleHintButtonTap() {
  if (!state.current) return;
  const qNum = state.qIdx + 1;
  // ランダムモードや1〜3問目では計算ヒントは既に表示中(or 出さない)なので、特に何もしない
  if (state.mode !== 'fixed' || qNum <= 3) {
    // 何もせず、軽くフィードバック (フェード)
    return;
  }
  // 4〜5問目: ヒント要求フラグを立てて、ヒント表示
  state.current.hintRequested = true;
  const btn = document.getElementById('hintBtn');
  btn.classList.remove('attention');
  btn.classList.add('active');
  clearIdleTimer();
  if (state.current.stepConfirmed) {
    const step = state.current.plan.steps[state.current.stepIdx];
    if (step) showHintForStep(step);
  }
}

/* ---------- RESULT SCREEN ---------- */
function showResults() {
  showScreen('resultScreen');
  const correct = state.correctCount;
  const total = state.questions.length;
  document.getElementById('resultCorrect').textContent = correct;
  document.getElementById('resultTotal').textContent = total;
  const pct = correct / total;
  let emoji, title, msg;
  if (pct === 1) {
    emoji = '🏆'; title = 'パーフェクト！'; msg = 'すごい！ぜんもん せいかい だよ！';
  } else if (pct >= 0.8) {
    emoji = '🌟'; title = 'よくできました！'; msg = 'もう ちょっとで パーフェクト！';
  } else if (pct >= 0.5) {
    emoji = '😊'; title = 'がんばったね！'; msg = 'この ちょうしで れんしゅう しよう！';
  } else {
    emoji = '💪'; title = 'もう いっかい!'; msg = 'まちがえても だいじょうぶ！れんしゅう が だいじ！';
  }
  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultMsg').textContent = msg;
  if (pct >= 0.8) launchConfetti();
}

function launchConfetti() {
  const container = document.getElementById('confetti');
  container.innerHTML = '';
  const colors = ['#f08a3e', '#4a90c8', '#5a9f6b', '#f5c842', '#e85a4f', '#8a6fb0'];
  for (let i = 0; i < 60; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + 'vw';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.animationDuration = (2 + Math.random() * 2) + 's';
    piece.style.animationDelay = Math.random() * 0.8 + 's';
    piece.style.transform = `rotate(${Math.random() * 360}deg)`;
    if (Math.random() > 0.5) piece.style.borderRadius = '50%';
    container.appendChild(piece);
  }
  setTimeout(() => container.innerHTML = '', 5000);
}

/* ---------- WIRE UP MAIN SCREEN ---------- */
function setupMainScreen() {
  document.querySelectorAll('.step-btn').forEach(btn => {
    btn.onclick = () => handleStepClick(btn.dataset.step);
  });
  document.querySelectorAll('.num-btn').forEach(btn => {
    btn.onclick = () => handleNumClick(parseInt(btn.dataset.num, 10));
  });
  document.getElementById('skipBtn').onclick = () => {
    if (!state.current) return;
    // 正解マーク表示中(完了済み)は「つぎへ」ボタンを使うのでスキップ無効
    if (state.current.completed) return;
    // スキップした問題は不正解扱い(正解カウントしない)で次の問題へ
    clearIdleTimer();
    const maru = document.getElementById('bigMaru');
    const nextBtn = document.getElementById('nextQBtn');
    maru.style.display = 'none';
    nextBtn.classList.remove('show');
    maru.style.left = ''; maru.style.top = '';
    maru.style.width = ''; maru.style.height = ''; maru.style.inset = '';
    nextBtn.style.top = ''; nextBtn.style.bottom = '';

    state.qIdx++;
    if (state.qIdx >= state.questions.length) {
      showResults();
    } else {
      loadQuestion();
    }
  };
  document.getElementById('backBtn').onclick = () => {
    if (confirm('タイトルへ もどりますか？ いまの もんだいは リセットされます。')) {
      const maru = document.getElementById('bigMaru');
      const nextBtn = document.getElementById('nextQBtn');
      maru.style.display = 'none';
      nextBtn.classList.remove('show');
      maru.style.left = ''; maru.style.top = '';
      maru.style.width = ''; maru.style.height = ''; maru.style.inset = '';
      nextBtn.style.top = ''; nextBtn.style.bottom = '';
      clearIdleTimer();
      showScreen('titleScreen');
    }
  };
}

function setupResultScreen() {
  document.getElementById('resultHomeBtn').onclick = () => showScreen('titleScreen');
  document.getElementById('resultRetryBtn').onclick = () => {
    buildQuestionSet();
    showScreen('mainScreen');
    requestAnimationFrame(() => loadQuestion());
  };
}

/* ---------- WINDOW RESIZE ----------
   画面サイズが変わってもひっ算の数字とマス目の整列を保つため、
   現在の表示内容をスナップショット → 再描画 → 復元 を行う */
let resizeTimer = null;
function handleResize() {
  if (!state.current) return;
  const mainActive = document.getElementById('mainScreen').classList.contains('active');
  if (!mainActive) return;
  if (state.current.completed) {
    // 正解表示中は筆算は再描画しないが、マークの位置は画面サイズに合わせて再計算する
    if (document.getElementById('bigMaru').style.display === 'flex') {
      positionCorrectMark();
    }
    return;
  }
  // スナップショット → 再描画 → 復元
  const snap = captureDivisionSnapshot();
  renderDivision();
  applyDivisionSnapshot(snap);
  // スポットライトとヒントは再計算
  if (state.current.stepConfirmed) {
    const step = state.current.plan.steps[state.current.stepIdx];
    if (step) {
      spotlightForStep(step);
      showHintForStep(step);
    }
  }
}
window.addEventListener('resize', () => {
  if (resizeTimer) clearTimeout(resizeTimer);
  resizeTimer = setTimeout(handleResize, 100);
});
window.addEventListener('orientationchange', () => {
  if (resizeTimer) clearTimeout(resizeTimer);
  resizeTimer = setTimeout(handleResize, 200);
});

/* ---------- INIT ---------- */
window.addEventListener('DOMContentLoaded', () => {
  setupTitleScreen();
  setupMainScreen();
  setupResultScreen();
  buildKukuTable();
  setupHintModal();
});
</script>
