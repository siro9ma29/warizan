<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>わりざんのひっ算れんしゅう</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Kosugi+Maru&family=Zen+Maru+Gothic:wght@500;700;900&family=Klee+One:wght@600&display=swap');

  /* ============ DESIGN TOKENS ============ */
  :root {
    --paper:       #fbf8f0;
    --paper-2:     #f5f0e1;
    --ink:         #2c3a4a;
    --ink-soft:    #5a6878;
    --grid:        #9dd4dc;       /* 方眼の線（少し濃いめのターコイズ） */
    --grid-soft:   #cfeaee;
    --line:        #c8d2dc;
    --accent:      #f08a3e;
    --accent-2:    #e85a4f;
    --green:       #5a9f6b;
    --blue:        #4a90c8;
    --purple:      #8a6fb0;
    --yellow:      #f5c842;
    --maru-red:    #e63946;       /* 正解の赤丸 */
    --shadow:      rgba(44, 58, 74, 0.12);
    --shadow-deep: rgba(44, 58, 74, 0.25);

    --font-display: 'Zen Maru Gothic', sans-serif;
    --font-hand:    'Klee One', 'Zen Maru Gothic', cursive;
    --font-ui:      'Kosugi Maru', sans-serif;

    /* 方眼の1マスのサイズ（JSで動的に上書き） */
    --cell: 64px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    overflow: hidden;
    font-family: var(--font-ui);
    color: var(--ink);
    background: var(--paper);
    user-select: none;
  }
  body {
    background-image:
      radial-gradient(circle at 20% 10%, rgba(245, 200, 66, 0.08), transparent 40%),
      radial-gradient(circle at 80% 90%, rgba(74, 144, 200, 0.08), transparent 40%);
  }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }

  /* ============ SCREENS ============ */
  .screen { position: fixed; inset: 0; display: none; }
  .screen.active { display: flex; }

  /* ============ TITLE SCREEN ============ */
  #titleScreen {
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 3vh 4vw;
    gap: 2.5vh;
  }
  .title-header { text-align: center; position: relative; }
  .title-header::before {
    content: "✏️"; position: absolute; left: -3em; top: 0.3em;
    font-size: 0.5em; transform: rotate(-15deg);
  }
  .title-header::after {
    content: "📐"; position: absolute; right: -3em; top: 0.3em;
    font-size: 0.5em; transform: rotate(15deg);
  }
  .app-title {
    font-family: var(--font-display); font-weight: 900;
    font-size: clamp(2.2rem, 5vw, 3.4rem);
    color: var(--ink); letter-spacing: 0.08em;
  }
  .app-title .accent { color: var(--accent); }
  .app-subtitle {
    font-family: var(--font-hand);
    font-size: clamp(0.95rem, 1.5vw, 1.2rem);
    color: var(--ink-soft); margin-top: 0.4em;
  }

  .section-label {
    font-family: var(--font-display); font-weight: 700;
    font-size: clamp(0.95rem, 1.4vw, 1.15rem);
    color: var(--ink-soft); margin-bottom: 0.8vh;
    text-align: center; letter-spacing: 0.05em;
  }
  .section-label .deco { color: var(--accent); }

  .level-grid {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 1vw;
    width: 94vw;
    max-width: 1200px;
  }
  .level-card {
    background: white; border: 2px solid var(--line);
    border-radius: 1.2vw; padding: 1.8vh 0.6vw;
    text-align: center; transition: all 0.2s ease;
    box-shadow: 0 4px 0 var(--line);
    min-height: 18vh;
    display: flex; flex-direction: column; justify-content: center; gap: 0.6vh;
  }
  .level-card:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--line); }
  .level-card.selected {
    border-color: var(--accent);
    box-shadow: 0 4px 0 var(--accent);
    background: #fff8ef;
  }
  .level-card .lv-num {
    font-family: var(--font-display); font-weight: 900;
    font-size: clamp(1.6rem, 2.6vw, 2.3rem);
    color: var(--accent); line-height: 1;
    position: relative;
  }
  .level-card .lv-num small {
    font-size: 0.42em; color: var(--ink-soft);
    display: block; font-weight: 700; margin-bottom: 0.3em;
    letter-spacing: 0.05em;
  }
  /* 派生レベルの小ラベル (例: 0をたてる) */
  .level-card .lv-num .lv-sub {
    display: block;
    font-family: var(--font-display);
    font-size: 0.32em; font-weight: 700;
    color: white; background: var(--purple);
    border-radius: 999px;
    padding: 0.25em 0.6em;
    margin: 0.4em auto 0;
    width: fit-content;
    letter-spacing: 0.02em;
    line-height: 1.2;
  }
  .level-card .lv-title {
    font-family: var(--font-display); font-weight: 700;
    font-size: clamp(0.78rem, 1.05vw, 0.95rem); color: var(--ink);
  }
  .level-card .lv-desc {
    font-family: var(--font-hand);
    font-size: clamp(0.65rem, 0.9vw, 0.8rem);
    color: var(--ink-soft); line-height: 1.4;
  }

  /* レベル6の派生(0をたてる)カード: 紫アクセントで「6の仲間」感を出す */
  .level-card.variant .lv-num { color: var(--purple); }
  .level-card.variant.selected {
    border-color: var(--purple);
    box-shadow: 0 4px 0 var(--purple);
    background: #f3eff8;
  }
  /* チャレンジカード: 金色アクセントで特別感を出す */
  .level-card.challenge .lv-num { color: #e0a020; }
  .level-card.challenge {
    background: linear-gradient(160deg, #fffdf5, #fff6e0);
    border-color: var(--yellow);
    box-shadow: 0 4px 0 var(--yellow);
  }
  .level-card.challenge.selected {
    border-color: #e0a020;
    box-shadow: 0 4px 0 #e0a020;
    background: linear-gradient(160deg, #fffaf0, #ffeec0);
  }

  .mode-row {
    display: flex; gap: 2vw;
    align-items: center; justify-content: center;
  }
  .mode-btn {
    background: white; border: 2px solid var(--line);
    border-radius: 1vw; padding: 1.6vh 2.5vw;
    font-family: var(--font-display); font-weight: 700;
    font-size: clamp(1rem, 1.4vw, 1.2rem);
    color: var(--ink);
    box-shadow: 0 3px 0 var(--line);
    transition: all 0.15s;
    display: flex; align-items: center; gap: 0.6em;
  }
  .mode-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 var(--line); }
  .mode-btn.selected {
    border-color: var(--blue);
    box-shadow: 0 3px 0 var(--blue);
    background: #eef5fb;
  }
  .mode-btn .icon { font-size: 1.4em; }

  .start-btn {
    background: var(--accent); color: white;
    font-family: var(--font-display); font-weight: 900;
    font-size: clamp(1.3rem, 2vw, 1.6rem);
    padding: 1.8vh 5vw; border-radius: 999px;
    box-shadow: 0 5px 0 #c46d2c, 0 10px 20px rgba(240, 138, 62, 0.3);
    transition: all 0.15s; letter-spacing: 0.1em;
  }
  .start-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #c46d2c; }
  .start-btn:disabled {
    background: #c8d2dc; box-shadow: 0 5px 0 #a8b2bc; cursor: not-allowed;
  }

  /* ============ MAIN SCREEN ============ */
  #mainScreen {
    flex-direction: column;
    padding: 1.5vh 2vw;
    gap: 1vh;
  }
  .top-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 0 1vw; flex-shrink: 0;
  }
  .top-bar .left, .top-bar .right { display: flex; gap: 1vw; align-items: center; }
  .pill {
    background: white; border: 2px solid var(--line);
    border-radius: 999px; padding: 0.6vh 1.2vw;
    font-family: var(--font-display); font-weight: 700;
    font-size: clamp(0.85rem, 1.1vw, 1rem);
    color: var(--ink); display: flex; align-items: center; gap: 0.5em;
  }
  .pill .num { color: var(--accent); font-weight: 900; }
  .icon-btn {
    background: white; border: 2px solid var(--line);
    border-radius: 50%;
    width: clamp(40px, 5vh, 56px); height: clamp(40px, 5vh, 56px);
    font-size: clamp(1.1rem, 1.6vw, 1.4rem);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 3px 0 var(--line); transition: all 0.1s;
  }
  .icon-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 var(--line); }
  /* ============ ヒントボタン (計算スペース右上) ============ */
  .hint-btn-container {
    position: absolute;
    top: 1.5vh;
    right: 1.5vh;
    z-index: 6;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.3vh;
    background: white;
    border: 3px solid var(--yellow);
    border-radius: 1.2vw;
    padding: 1vh 1.4vw;
    box-shadow: 0 4px 0 var(--yellow), 0 6px 16px rgba(245, 200, 66, 0.25);
    cursor: pointer;
    font-family: var(--font-display);
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
    /* 「ここにあるよ」と存在感を出すため、常時ふんわり光る */
    animation: hintIdleGlow 2.5s ease-in-out infinite;
  }
  .hint-btn-container:hover {
    transform: translateY(-2px);
  }
  .hint-btn-container:active,
  .hint-btn-container.pressing {
    transform: translateY(2px);
    box-shadow: 0 2px 0 var(--yellow);
  }
  .hint-btn-icon {
    font-size: clamp(1.4rem, 3vh, 2rem);
    line-height: 1;
  }
  .hint-btn-label {
    font-size: clamp(0.7rem, 1.2vh, 0.9rem);
    font-weight: 700;
    color: #b8860b;
    letter-spacing: 0.08em;
  }
  /* デフォルトの「ふんわり光る」アニメ */
  @keyframes hintIdleGlow {
    0%, 100% {
      box-shadow: 0 4px 0 var(--yellow), 0 6px 16px rgba(245, 200, 66, 0.25);
    }
    50% {
      box-shadow: 0 4px 0 var(--yellow), 0 6px 24px rgba(245, 200, 66, 0.55);
    }
  }
  /* 計算ヒント有効中の active 状態 */
  .hint-btn-container.active {
    background: var(--green);
    border-color: var(--green);
    box-shadow: 0 4px 0 #468055, 0 6px 16px rgba(90, 159, 107, 0.3);
    animation: none;
  }
  .hint-btn-container.active .hint-btn-label {
    color: white;
  }
  .hint-btn-container.active .hint-btn-icon {
    filter: brightness(1.3);
  }
  /* 「ここを押して」と気づかせる強い点滅 */
  .hint-btn-container.attention {
    animation: hintAttention 0.9s ease-in-out infinite;
    border-color: var(--green);
  }
  @keyframes hintAttention {
    0%, 100% {
      transform: scale(1);
      box-shadow: 0 4px 0 var(--green), 0 0 0 0 rgba(90, 159, 107, 0.7);
    }
    50% {
      transform: scale(1.15);
      box-shadow: 0 4px 0 var(--green), 0 0 0 16px rgba(90, 159, 107, 0);
    }
  }
  /* 長押し中の青いリング */
  .hint-btn-container.pressing::after {
    content: "";
    position: absolute;
    inset: -6px;
    border-radius: 1.5vw;
    border: 3px solid var(--blue);
    opacity: 0.7;
    pointer-events: none;
    animation: longPressRing 0.5s linear forwards;
  }
  @keyframes longPressRing {
    0%   { transform: scale(0.85); opacity: 0.4; }
    100% { transform: scale(1.25); opacity: 0; }
  }

  /* ============ スキップボタン (控えめ・ヒントボタンの左隣) ============ */
  .skip-btn {
    position: absolute;
    top: 1.5vh;
    /* ヒントボタン(右1.5vh)の左隣に置く。ヒントボタン幅+余白ぶん右から離す */
    right: calc(1.5vh + 90px);
    z-index: 6;
    background: rgba(255, 255, 255, 0.75);
    border: 1.5px solid var(--line);
    border-radius: 999px;
    padding: 0.6vh 1.1vw;
    font-family: var(--font-ui);
    font-size: clamp(0.7rem, 1.1vh, 0.85rem);
    color: var(--ink-soft);
    box-shadow: 0 2px 0 var(--line);
    opacity: 0.55;
    transition: all 0.15s;
    letter-spacing: 0.03em;
  }
  .skip-btn:hover { opacity: 0.95; }
  .skip-btn:active {
    transform: translateY(2px);
    box-shadow: 0 1px 0 var(--line);
    opacity: 1;
  }

  .main-body {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2vw;
    min-height: 0;
  }

  /* ============ LEFT: CALC PANEL (方眼ノート) ============ */
  .calc-panel {
    background: white;
    border: 2px solid var(--line);
    border-radius: 1.5vw;
    position: relative;
    overflow: hidden;
    box-shadow: 0 4px 0 var(--line);
  }
  /* 左の赤い縦ライン（ノートっぽさ） */
  .calc-panel::before {
    content: "";
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 8px;
    background: linear-gradient(to bottom, var(--accent-2), var(--accent));
    opacity: 0.6; z-index: 5;
  }

  /* 方眼背景のレイヤー: divisionと座標が完全一致するように、
     JSでoffset(--gx, --gy)をdivisionの位置に合わせる */
  .calc-grid {
    position: absolute;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background-image:
      linear-gradient(to right, var(--grid) 1px, transparent 1px),
      linear-gradient(to bottom, var(--grid) 1px, transparent 1px);
    background-size: var(--cell) var(--cell);
    background-position: var(--gx, 0px) var(--gy, 0px);
  }

  /* ひっ算配置エリア（絶対座標、JSで位置調整） */
  .division {
    position: absolute;
    /* topとleftはJSでマス単位に合わせて設定 */
    z-index: 2;
  }

  /* セル（方眼の1マス） */
  .cell {
    position: absolute;
    width: var(--cell);
    height: var(--cell);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-hand);
    font-weight: 600;
    font-size: calc(var(--cell) * 0.7);
    color: var(--ink);
    transition: background 0.25s ease, box-shadow 0.25s ease;
    line-height: 1;
  }
  .cell.spot {
    background: rgba(245, 200, 66, 0.4);
    border-radius: 6px;
    box-shadow: 0 0 0 2px rgba(245, 200, 66, 0.7);
  }
  /* ヒント: 計算ソースとなる数字を緑のパルスで強調 */
  .cell.hint-source,
  .divisor-cell.hint-source {
    color: var(--green) !important;
    animation: hintPulse 1.4s ease-in-out infinite !important;
    border-radius: 6px;
    z-index: 3;
  }
  @keyframes hintPulse {
    0%, 100% {
      background: rgba(90, 159, 107, 0.15);
      box-shadow: 0 0 0 2px rgba(90, 159, 107, 0.4);
      transform: scale(1);
    }
    50% {
      background: rgba(90, 159, 107, 0.35);
      box-shadow: 0 0 0 4px rgba(90, 159, 107, 0.7);
      transform: scale(1.08);
    }
  }
  /* 演算記号ヒント (÷ × -) */
  .op-hint {
    position: absolute;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-display);
    font-weight: 900;
    font-size: calc(var(--cell) * 0.5);
    color: var(--green);
    pointer-events: none;
    z-index: 4;
    background: white;
    border: 2px solid var(--green);
    border-radius: 50%;
    width: calc(var(--cell) * 0.55);
    height: calc(var(--cell) * 0.55);
    box-shadow: 0 2px 8px rgba(90, 159, 107, 0.35);
    animation: opHintIn 0.35s ease-out, opHintBounce 1.4s ease-in-out 0.35s infinite;
  }
  @keyframes opHintIn {
    0%   { transform: scale(0) rotate(-90deg); opacity: 0; }
    100% { transform: scale(1) rotate(0deg);   opacity: 1; }
  }
  @keyframes opHintBounce {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.15); }
  }
  .cell.error {
    animation: shake 0.5s, flashRed 0.6s 3;
    color: var(--accent-2);
  }
  .cell.correct-pop {
    animation: pop 0.4s;
    color: var(--green);
  }
  .cell.fade-in {
    animation: fadeIn 0.3s;
  }
  .cell.drop-anim {
    animation: dropDown 0.6s cubic-bezier(0.34, 1.4, 0.64, 1);
  }
  /* 中間計算の0を薄く表示 (例: 648÷2 で 6-6=0 のとき) */
  .cell.faded {
    color: var(--line);
    opacity: 0.5;
  }
  /* leadingZeroモードの商の先頭0: 薄く表示(入力直後)。fadedより少し見えるグレーに */
  .cell.lead-zero {
    color: var(--ink-soft);
    opacity: 0.55;
    position: relative;
  }
  /* 問題完了時: 斜線を引いて「消した」ことを示す */
  .cell.lead-zero.struck::after {
    content: "";
    position: absolute;
    left: 12%;
    right: 12%;
    top: 50%;
    height: 3px;
    background: var(--accent-2);
    border-radius: 3px;
    transform: rotate(-25deg);
    transform-origin: center;
    animation: strikeIn 0.35s ease-out forwards;
  }
  @keyframes strikeIn {
    0%   { transform: rotate(-25deg) scaleX(0); opacity: 0; }
    100% { transform: rotate(-25deg) scaleX(1); opacity: 1; }
  }
  /* 薄字(faded)の0は計算ソースとして扱わない (例: 「09÷3」と誤読されるのを防ぐ)
     hint-sourceクラスが付いても、fadedの見た目を優先する */
  .cell.faded.hint-source {
    color: var(--line) !important;
    opacity: 0.5 !important;
    animation: none !important;
    background: transparent !important;
    box-shadow: none !important;
  }

  /* divisor（わる数）+ ブラケット記号 */
  .divisor-cell {
    /* 数字部分 */
    position: absolute;
    width: var(--cell);
    height: var(--cell);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-hand);
    font-weight: 600;
    font-size: calc(var(--cell) * 0.7);
    color: var(--ink);
    line-height: 1;
  }

  /* ÷の役を果たすブラケット ")" の縦線 */
  .bracket-line {
    position: absolute;
    width: 3px;
    background: var(--ink);
    border-radius: 3px;
  }
  /* 上線（商の下、わられる数の上） */
  .top-bar-line {
    position: absolute;
    height: 3px;
    background: var(--ink);
    border-radius: 3px;
  }
  /* かけ算の結果の下の線 */
  .sub-line {
    position: absolute;
    height: 3px;
    background: var(--ink);
    border-radius: 3px;
  }

  /* あまり表示タグ */
  .remainder-tag {
    position: absolute;
    display: flex; align-items: center; gap: 0.4em;
    font-family: var(--font-hand);
    font-size: calc(var(--cell) * 0.4);
    color: var(--ink-soft); white-space: nowrap;
    z-index: 3;
  }
  .remainder-tag .label {
    background: var(--paper-2); padding: 0.2em 0.5em;
    border-radius: 6px;
  }
  .remainder-tag .value {
    color: var(--accent); font-weight: 700;
    min-width: 1.2em; text-align: center;
  }

  /* ============ 大きな赤丸（正解マーク） ============ */
  .big-maru {
    position: absolute;
    /* 位置・サイズは JS(positionCorrectMark)で筆算を避けて動的に設定する。
       下記はフォールバック値 */
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 10;
    gap: 1vh;
  }
  .big-maru .maru-svg-wrap {
    /* サイズは JS で配置領域に合わせて上書きする。下記はフォールバック */
    width: 40vh;
    max-width: 90%;
    height: 40vh;
    max-height: 90%;
    animation: maruDraw 0.6s cubic-bezier(0.34, 1.2, 0.64, 1) forwards;
  }
  .big-maru svg {
    width: 100%;
    height: 100%;
  }
  .big-maru circle {
    fill: none;
    stroke: var(--maru-red);
    stroke-width: 12;
    stroke-linecap: round;
    stroke-dasharray: 1200;
    stroke-dashoffset: 1200;
    animation: maruStroke 0.7s ease-out forwards;
    filter: drop-shadow(0 4px 8px rgba(230, 57, 70, 0.3));
  }
  @keyframes maruDraw {
    0%   { transform: scale(0.3) rotate(-30deg); opacity: 0; }
    60%  { transform: scale(1.1) rotate(5deg);  opacity: 1; }
    100% { transform: scale(1)   rotate(0deg);   opacity: 1; }
  }
  @keyframes maruStroke {
    to { stroke-dashoffset: 0; }
  }
  .big-maru .seikai-text {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: clamp(1.5rem, 4.5vh, 2.6rem);
    color: var(--maru-red);
    background: white;
    padding: 0.4em 1.2em;
    border-radius: 999px;
    border: 3px solid var(--maru-red);
    box-shadow: 0 6px 0 #b32530, 0 10px 25px rgba(230, 57, 70, 0.3);
    letter-spacing: 0.15em;
    opacity: 0;
    animation: textPop 0.4s 0.6s forwards;
  }
  @keyframes textPop {
    0%   { transform: translateY(20px) scale(0.5); opacity: 0; }
    100% { transform: translateY(0) scale(1); opacity: 1; }
  }

  /* ============ ANIMATIONS ============ */
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-6px); }
    40%, 80% { transform: translateX(6px); }
  }
  @keyframes flashRed {
    0%, 100% { background: transparent; }
    50% { background: rgba(232, 90, 79, 0.3); border-radius: 8px; }
  }
  @keyframes pop {
    0%   { transform: scale(0.5); opacity: 0; }
    60%  { transform: scale(1.2); }
    100% { transform: scale(1);   opacity: 1; }
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes dropDown {
    0%   { transform: translateY(calc(var(--cell) * -3)); opacity: 0; }
    60%  { transform: translateY(calc(var(--cell) * 0.2)); opacity: 1; }
    100% { transform: translateY(0); opacity: 1; }
  }

  /* ============ RIGHT: CONTROLS ============ */
  .controls {
    display: flex; flex-direction: column;
    gap: 2vh; min-height: 0;
  }
  .step-panel {
    background: white; border: 2px solid var(--line);
    border-radius: 1.5vw; padding: 2vh 1.5vw;
    box-shadow: 0 4px 0 var(--line);
  }
  .panel-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 1.5vh;
  }
  .panel-title {
    font-family: var(--font-display); font-weight: 700;
    font-size: clamp(0.95rem, 1.2vw, 1.1rem); color: var(--ink);
  }
  .step-hint {
    font-family: var(--font-hand);
    font-size: clamp(0.7rem, 0.9vw, 0.85rem); color: var(--ink-soft);
  }
  .step-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 1vw;
  }
  .step-btn {
    aspect-ratio: 1 / 0.85;
    background: white; border: 3px solid var(--line);
    border-radius: 1vw;
    box-shadow: 0 4px 0 var(--line);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 0.4vh; transition: all 0.1s;
    font-family: var(--font-display);
  }
  .step-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 var(--line); }
  .step-btn .step-icon { font-size: clamp(1.4rem, 2.5vh, 2rem); }
  .step-btn .step-label {
    font-weight: 900; font-size: clamp(0.95rem, 1.4vw, 1.2rem);
    letter-spacing: 0.08em;
  }
  .step-btn.tateru { color: var(--blue); }
  .step-btn.tateru.next  { border-color: var(--blue); box-shadow: 0 4px 0 var(--blue); background: #eef5fb; animation: pulse 1.5s infinite; }
  .step-btn.kakeru { color: var(--green); }
  .step-btn.kakeru.next  { border-color: var(--green); box-shadow: 0 4px 0 var(--green); background: #edf5ee; animation: pulse 1.5s infinite; }
  .step-btn.hiku   { color: var(--purple); }
  .step-btn.hiku.next    { border-color: var(--purple); box-shadow: 0 4px 0 var(--purple); background: #f1edf5; animation: pulse 1.5s infinite; }
  .step-btn.orosu  { color: var(--accent); }
  .step-btn.orosu.next   { border-color: var(--accent); box-shadow: 0 4px 0 var(--accent); background: #fff5eb; animation: pulse 1.5s infinite; }
  .step-btn.wrong {
    animation: shake 0.5s;
    background: #fde8e6; border-color: var(--accent-2);
  }
  @keyframes pulse {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-4px); }
  }

  .numpad-panel {
    background: white; border: 2px solid var(--line);
    border-radius: 1.5vw; padding: 2vh 1.5vw;
    box-shadow: 0 4px 0 var(--line);
    flex: 1; display: flex; flex-direction: column;
    min-height: 0;
  }
  .numpad-panel.disabled .num-btn {
    opacity: 0.35; cursor: not-allowed; pointer-events: none;
  }
  .numpad-panel.disabled { background: #f8f5ed; }
  .numpad-grid {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    grid-template-rows: repeat(2, 1fr);
    gap: 0.8vw;
    min-height: 0;
  }
  .num-btn {
    background: white; border: 3px solid var(--line);
    border-radius: 1vw;
    font-family: var(--font-hand); font-weight: 600;
    font-size: clamp(1.8rem, 4vh, 2.8rem);
    color: var(--ink);
    box-shadow: 0 4px 0 var(--line);
    transition: all 0.08s;
    display: flex; align-items: center; justify-content: center;
  }
  .numpad-panel:not(.disabled) .num-btn:active {
    transform: translateY(3px);
    box-shadow: 0 1px 0 var(--accent);
    background: #fff8ef;
  }
  .num-btn.wrong {
    animation: shake 0.5s;
    background: #fde8e6;
    border-color: var(--accent-2);
    color: var(--accent-2);
  }

  /* ============ NEXT BUTTON (大きな次へ) ============ */
  .next-q-btn {
    position: absolute;
    bottom: 4vh;
    left: 50%;
    transform: translateX(-50%);
    background: var(--accent);
    color: white;
    font-family: var(--font-display);
    font-weight: 900;
    font-size: clamp(1.2rem, 2.2vh, 1.6rem);
    padding: 1.8vh 4vw;
    border-radius: 999px;
    box-shadow: 0 5px 0 #c46d2c, 0 10px 25px rgba(240, 138, 62, 0.4);
    z-index: 20;
    letter-spacing: 0.08em;
    display: none;
    animation: nextBtnIn 0.5s 0.8s both;
  }
  .next-q-btn:active { transform: translateX(-50%) translateY(3px); box-shadow: 0 2px 0 #c46d2c; }
  .next-q-btn.show { display: block; }
  @keyframes nextBtnIn {
    from { transform: translateX(-50%) translateY(40px); opacity: 0; }
    to { transform: translateX(-50%) translateY(0); opacity: 1; }
  }

  /* ============ MODAL ============ */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(44, 58, 74, 0.6);
    display: none; align-items: center; justify-content: center;
    z-index: 100; backdrop-filter: blur(3px);
  }
  .modal-overlay.active { display: flex; animation: fadeIn 0.2s; }
  .modal {
    background: var(--paper); border-radius: 2vw;
    padding: 3vh 3vw;
    max-width: 92vw; max-height: 92vh;
    box-shadow: 0 20px 60px var(--shadow-deep);
    position: relative; animation: pop 0.3s;
  }
  .modal-close {
    position: absolute; top: -1vh; right: -1vh;
    width: 5vh; height: 5vh;
    background: var(--accent-2); color: white;
    border-radius: 50%; font-size: 2.5vh; font-weight: 900;
    box-shadow: 0 4px 12px var(--shadow);
  }
  .modal-title {
    font-family: var(--font-display); font-weight: 900;
    font-size: clamp(1.4rem, 2.5vh, 2rem);
    text-align: center; color: var(--ink); margin-bottom: 2vh;
  }
  .modal-title .deco { color: var(--accent); }
  /* モーダル下部の使い方説明 */
  .modal-hint-note {
    margin-top: 2vh;
    text-align: center;
    font-family: var(--font-hand);
    font-size: clamp(0.75rem, 1.4vh, 0.95rem);
    color: var(--ink-soft);
    background: var(--paper-2);
    padding: 1vh 2vw;
    border-radius: 999px;
    border: 1px dashed var(--line);
  }
  .kuku-table {
    display: grid;
    grid-template-columns: auto repeat(9, 1fr);
    gap: 2px; background: var(--ink);
    border-radius: 1vw; overflow: hidden; padding: 2px;
  }
  .kuku-cell {
    background: white; padding: 0.6vh 0.4vw;
    text-align: center; font-family: var(--font-hand);
    font-size: clamp(0.85rem, 1.4vh, 1.1rem);
    color: var(--ink); font-weight: 600;
  }
  .kuku-header {
    background: var(--accent); color: white;
    font-family: var(--font-display); font-weight: 900;
  }
  .kuku-row-header {
    background: var(--blue); color: white;
    font-family: var(--font-display); font-weight: 900;
  }

  /* ============ RESULT SCREEN ============ */
  #resultScreen {
    flex-direction: column;
    align-items: center; justify-content: center;
    padding: 4vh 4vw; gap: 3vh;
  }
  .result-card {
    background: white; border-radius: 2vw;
    padding: 5vh 8vw;
    box-shadow: 0 8px 0 var(--line), 0 20px 40px var(--shadow);
    text-align: center; border: 3px solid var(--accent);
    position: relative;
  }
  .result-emoji {
    font-size: clamp(4rem, 12vh, 7rem);
    line-height: 1; margin-bottom: 2vh;
    animation: bounce 1.5s infinite;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
  }
  .result-title {
    font-family: var(--font-display); font-weight: 900;
    font-size: clamp(2rem, 4vh, 3rem);
    color: var(--ink); margin-bottom: 1vh;
  }
  .result-score {
    font-family: var(--font-display); font-weight: 900;
    font-size: clamp(2.5rem, 6vh, 4rem);
    color: var(--accent); margin: 2vh 0;
  }
  .result-score small { font-size: 0.5em; color: var(--ink-soft); }
  .result-msg {
    font-family: var(--font-hand);
    font-size: clamp(1rem, 1.8vh, 1.3rem);
    color: var(--ink-soft); margin-bottom: 3vh;
  }
  .result-buttons {
    display: flex; gap: 2vw; justify-content: center;
  }
  .result-btn {
    background: white; border: 3px solid var(--line);
    color: var(--ink); font-family: var(--font-display);
    font-weight: 700; font-size: clamp(1rem, 1.6vh, 1.2rem);
    padding: 1.5vh 2.5vw; border-radius: 999px;
    box-shadow: 0 4px 0 var(--line);
    transition: all 0.15s;
  }
  .result-btn.primary {
    background: var(--accent); color: white;
    border-color: var(--accent);
    box-shadow: 0 4px 0 #c46d2c;
  }
  .result-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--line); }
  .result-btn.primary:active { box-shadow: 0 2px 0 #c46d2c; }

  .confetti {
    position: fixed; pointer-events: none;
    inset: 0; overflow: hidden; z-index: 50;
  }
  .confetti-piece {
    position: absolute; width: 12px; height: 12px;
    opacity: 0.9; animation: confettiFall linear forwards;
  }
  @keyframes confettiFall {
    0% { transform: translateY(-100vh) rotate(0deg); }
    100% { transform: translateY(110vh) rotate(720deg); }
  }

  @media (max-width: 900px) {
    .main-body { grid-template-columns: 1fr; }
    .level-grid { grid-template-columns: repeat(3, 1fr); }
  }

  /* ============ スマホ縦長対応 ============ */
  @media (max-width: 599px) {

    /* タイトル画面 */
    #titleScreen {
      padding: 2vh 4vw;
      gap: 2vh;
      overflow-y: auto;
    }
    .app-title { font-size: clamp(1.5rem, 7vw, 2.2rem); }
    .app-title::before, .app-title::after { display: none; }
    .app-subtitle { font-size: 0.85rem; }
    .level-grid {
      grid-template-columns: 1fr 1fr;
      gap: 2vw; width: 96vw;
    }
    .level-card { min-height: 14vh; padding: 1.5vh 1vw; }
    .level-card .lv-num { font-size: clamp(1.4rem, 6vw, 2rem); }
    .level-card .lv-desc { font-size: 0.7rem; }
    .mode-row { gap: 3vw; }
    .mode-btn { padding: 1.4vh 4vw; font-size: 0.9rem; }
    .start-btn { font-size: 1.1rem; padding: 1.6vh 8vw; }

    /* メイン画面: 縦積みに変更 */
    #mainScreen {
      padding: 1vh 2vw;
      gap: 1vh;
    }

    /* トップバーをコンパクトに */
    .top-bar { padding: 0 0.5vw; }
    .pill { padding: 0.5vh 2.5vw; font-size: 0.78rem; }
    .icon-btn {
      width: 36px; height: 36px;
      font-size: 1rem;
    }

    /* メインボディ: ひっ算(上) → コントロール(下) の縦積み */
    .main-body {
      display: flex;
      flex-direction: column;
      gap: 1vh;
    }

    /* ひっ算エリアは上部に固定高さ */
    .calc-panel {
      flex: 0 0 38vh;
      min-height: 38vh;
      border-radius: 3vw;
    }

    /* スマホ縦: ヒントボタンを少し小さく */
    .hint-btn-container {
      top: 1vh;
      right: 1vh;
      padding: 0.7vh 2vw;
      border-radius: 2.5vw;
      border-width: 2px;
      gap: 0.1vh;
    }
    .hint-btn-icon { font-size: 1.2rem; }
    .hint-btn-label { font-size: 0.65rem; }

    /* スマホ縦: スキップボタンも合わせて小さく */
    .skip-btn {
      top: 1vh;
      right: calc(1vh + 64px);
      padding: 0.5vh 2vw;
      font-size: 0.65rem;
    }

    /* コントロールエリア */
    .controls {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 1vh;
      min-height: 0;
    }

    /* 手順ボタンパネル */
    .step-panel {
      border-radius: 3vw;
      padding: 1.2vh 2.5vw;
    }
    .panel-header { margin-bottom: 0.8vh; }
    .panel-title { font-size: 0.82rem; }
    .step-hint { font-size: 0.7rem; }
    .step-grid { gap: 1.5vw; }
    .step-btn {
      aspect-ratio: 1 / 0.9;
      border-radius: 2.5vw;
      border-width: 2px;
      box-shadow: 0 3px 0 var(--line);
      gap: 0.2vh;
    }
    .step-btn .step-icon { font-size: 1.4rem; }
    .step-btn .step-label { font-size: 0.85rem; letter-spacing: 0; }

    /* テンキーパネル */
    .numpad-panel {
      flex: 1;
      border-radius: 3vw;
      padding: 1.2vh 2.5vw;
      min-height: 0;
    }
    .numpad-grid { gap: 1.5vw; }
    .num-btn {
      border-radius: 2.5vw;
      border-width: 2px;
      box-shadow: 0 3px 0 var(--line);
      font-size: clamp(1.4rem, 6vw, 2rem);
    }

    /* 次の問題へボタン */
    .next-q-btn {
      font-size: 1rem;
      padding: 1.4vh 6vw;
      bottom: 2vh;
    }

    /* リザルト画面 */
    #resultScreen { padding: 3vh 4vw; gap: 2vh; }
    .result-card { padding: 4vh 6vw; border-radius: 4vw; }
    .result-emoji { font-size: 4rem; }
    .result-title { font-size: 1.6rem; }
    .result-score { font-size: 2.4rem; }
    .result-msg { font-size: 0.9rem; }
    .result-buttons { gap: 3vw; }
    .result-btn { font-size: 0.9rem; padding: 1.2vh 4vw; }

    /* モーダル（九九表）: スクロール可能に */
    .modal { padding: 2vh 3vw; border-radius: 4vw; overflow-y: auto; max-height: 85vh; }
    .kuku-cell { padding: 0.5vh 0.3vw; font-size: 0.75rem; }

    /* 赤丸のサイズ調整 */
    .big-maru .maru-svg-wrap { width: 38vh; height: 38vh; }
    .big-maru .seikai-text { font-size: 1.2rem; }
  }

  /* ============ スマホ横向き対応 ============ */
  @media (max-height: 480px) and (orientation: landscape) {
    #mainScreen { padding: 0.5vh 1.5vw; gap: 0.5vh; }
    .top-bar .pill { padding: 0.3vh 1.5vw; font-size: 0.72rem; }
    .icon-btn { width: 30px; height: 30px; font-size: 0.85rem; }

    .main-body {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5vw;
    }
    .calc-panel { flex: unset; min-height: unset; }
    .controls { gap: 0.8vh; }

    .step-panel { padding: 0.8vh 1.5vw; }
    .panel-header { margin-bottom: 0.4vh; }
    .panel-title { font-size: 0.75rem; }
    .step-hint { display: none; }  /* 横向き狭い時は省略 */
    .step-btn {
      aspect-ratio: 1 / 0.7;
      gap: 0;
    }
    .step-btn .step-icon { font-size: 1rem; }
    .step-btn .step-label { font-size: 0.72rem; }

    .numpad-panel { padding: 0.8vh 1.5vw; }
    .num-btn { font-size: clamp(1.2rem, 4.5vw, 1.6rem); }
    .numpad-grid { gap: 0.6vw; }

    /* スマホ横向き: ヒントボタンを小さく */
    .hint-btn-container {
      top: 0.5vh;
      right: 0.5vh;
      padding: 0.4vh 1.2vw;
      border-width: 2px;
      border-radius: 1.5vw;
      gap: 0;
    }
    .hint-btn-icon { font-size: 1rem; }
    .hint-btn-label { font-size: 0.6rem; }

    /* スマホ横向き: スキップボタンも小さく */
    .skip-btn {
      top: 0.5vh;
      right: calc(0.5vh + 56px);
      padding: 0.4vh 1.2vw;
      font-size: 0.6rem;
    }
  }
</style>
</head>
<body>

<!-- ============ TITLE SCREEN ============ -->
<div id="titleScreen" class="screen active">
  <div class="title-header">
    <h1 class="app-title">わりざんの<span class="accent">ひっ算</span>れんしゅう</h1>
    <p class="app-subtitle">〜 たてる ・ かける ・ ひく ・ おろす 〜</p>
  </div>

  <div>
    <div class="section-label"><span class="deco">1.</span> レベルを えらぼう</div>
    <div class="level-grid" id="levelGrid"></div>
  </div>

  <div>
    <div class="section-label"><span class="deco">2.</span> モードを えらぼう</div>
    <div class="mode-row">
      <button class="mode-btn selected" data-mode="fixed">
        <span class="icon">📚</span><span>こていもんだい</span>
      </button>
      <button class="mode-btn" data-mode="random">
        <span class="icon">🎲</span><span>ランダムもんだい</span>
      </button>
    </div>
  </div>

  <button class="start-btn" id="startBtn" disabled>はじめる →</button>
</div>


<!-- ============ MAIN SCREEN ============ -->
<div id="mainScreen" class="screen">
  <div class="top-bar">
    <div class="left">
      <button class="icon-btn" id="backBtn" title="タイトルへ もどる">↩</button>
      <div class="pill">レベル <span class="num" id="levelDisplay">1</span></div>
      <div class="pill">もんだい <span class="num" id="qNumDisplay">1</span> / <span id="qTotalDisplay">5</span></div>
    </div>
    <div class="right">
      <div class="pill">⭕ <span class="num" id="correctDisplay">0</span></div>
    </div>
  </div>

  <div class="main-body">
    <div class="calc-panel" id="calcPanel">
      <div class="calc-grid" id="calcGrid">
        <div class="division" id="division"></div>
      </div>
      <!-- スキップボタン (ヒントボタンの左隣・控えめ) -->
      <button class="skip-btn" id="skipBtn" title="この もんだいを スキップ">スキップ →</button>
      <!-- ヒントボタン (計算スペース右上) -->
      <button class="hint-btn-container" id="hintBtn" title="タップ:けいさんヒント / 長押し:くくひょう">
        <span class="hint-btn-icon">💡</span>
        <span class="hint-btn-label">ヒント</span>
      </button>
      <!-- 大きな赤丸（正解時に表示） -->
      <div class="big-maru" id="bigMaru" style="display:none;">
        <div class="maru-svg-wrap">
          <svg viewBox="0 0 400 400" preserveAspectRatio="xMidYMid meet">
            <circle cx="200" cy="200" r="170"></circle>
          </svg>
        </div>
        <div class="seikai-text">せいかい！</div>
      </div>
      <!-- 次の問題へボタン -->
      <button class="next-q-btn" id="nextQBtn">つぎの もんだいへ →</button>
    </div>

    <div class="controls">
      <div class="step-panel">
        <div class="panel-header">
          <div class="panel-title">てじゅんを えらぼう</div>
          <div class="step-hint" id="stepHint">つぎは…?</div>
        </div>
        <div class="step-grid" id="stepGrid">
          <button class="step-btn tateru" data-step="tateru">
            <span class="step-icon">⬆️</span><span class="step-label">たてる</span>
          </button>
          <button class="step-btn kakeru" data-step="kakeru">
            <span class="step-icon">✖️</span><span class="step-label">かける</span>
          </button>
          <button class="step-btn hiku" data-step="hiku">
            <span class="step-icon">➖</span><span class="step-label">ひく</span>
          </button>
          <button class="step-btn orosu" data-step="orosu">
            <span class="step-icon">⬇️</span><span class="step-label">おろす</span>
          </button>
        </div>
      </div>

      <div class="numpad-panel disabled" id="numpadPanel">
        <div class="panel-header">
          <div class="panel-title">すうじを いれよう</div>
          <div class="step-hint" id="numHint">てじゅんを えらんでね</div>
        </div>
        <div class="numpad-grid">
          <button class="num-btn" data-num="1">1</button>
          <button class="num-btn" data-num="2">2</button>
          <button class="num-btn" data-num="3">3</button>
          <button class="num-btn" data-num="4">4</button>
          <button class="num-btn" data-num="5">5</button>
          <button class="num-btn" data-num="6">6</button>

    fixed: [
      [47, 3], [65, 4], [83, 5], [76, 6], [59, 4],

    ],
    randomGen: () => {
      // 2桁÷1桁、あまりあり、商の各桁が0でない (商は2桁)
      while (true) {
        const div = rand(2, 9);

        if (dividend % div === 0) continue;
        const q = Math.floor(dividend / div);
        if (q < 10) continue;            // 商が2桁
        if (String(q).includes('0')) continue;  // 商に0が含まれない

  3: {

    desc: '2けた÷1けた\n商の一の位が0',

      // ▼ 前半5問: 被除数の一の位が「0以外」 (商の一の位は0)
      [82, 4],   // 商20あまり2

      [65, 6],   // 商10あまり5
      [92, 3],   // 商30あまり2

      // ▼ 後半5問: 被除数の一の位が「0」 (商の一の位も0)

    ],

      // 2桁÷1桁、商の一の位が0、商は2桁(商10〜90で一の位=0)
      // 被除数の一の位は0でも0以外でもOK (あまりあり・なし両方)
      while (true) {

        const q = Math.floor(dividend / div);

    randomGen: () => {

      while (true) {

        const firstDigit = Math.floor(dividend / 100);
        if (firstDigit < div) continue;
        const q = Math.floor(dividend / div);
        if (q < 100) continue;  // 商が3桁である必要
        const qStr = String(q);

        if (qStr[1] === '0' || qStr[2] === '0') return [dividend, div];

  },
  6: {

    badge: '6',
    fixed: [
